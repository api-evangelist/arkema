description: >-
  Arkema integrations settle through commercial supply and distribution
  agreements rather than a metered API invoice. FinOps mapping is structural
  only — covering procurement-grade cost allocation rather than per-call usage
  charges.
notes: >-
  No public developer pricing — placeholder only. Costs flow through goods
  pricing (per-tonne or per-unit polymer, adhesive, coating, intermediate),
  freight and service charges rather than a metered API line item.
