meters:
  - name: customer_contract
    description: Customer or distributor relationship — not a metered API unit.
    unit: contract
    aggregation: count
    dimensions:
      - customer
      - segment
      - region
principles:
  - name: Visibility
    description: >-
      Track Arkema and Bostik spend inside procurement and supply-chain
      systems; there is no metered usage feed for catalog or order APIs.
  - name: Allocation
    description: >-
      Allocate cost to the product line, plant or finished-good SKU that
      consumes the polymer, adhesive, coating or intermediate.
  - name: Optimization
    description: >-
      Optimize through grade rationalization, volume consolidation, regional
      sourcing and joint sustainability projects rather than API call tuning.
  - name: Accountability
    description: >-
      Procurement and R&D jointly own the supplier relationship; sustainability
      teams co-own Scope 3 reporting tied to Arkema purchases.
