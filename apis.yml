  - type: Segments
    data:
      - name: Adhesive Solutions
        description: >-
          Adhesives, sealants and bonding solutions delivered through Bostik for
          construction, packaging, hygiene, industrial assembly and consumer DIY.
      - name: Advanced Materials
        description: >-
          High performance polymers (Kynar PVDF, Rilsan polyamide 11/12, Pebax,
          Kepstan PEKK) and performance additives (organic peroxides, thiochemicals,
          molecular sieves).
      - name: Coating Solutions
        description: >-
          Acrylic monomers, coating resins, Sartomer UV/LED/EB photocure resins
          and Coatex rheology additives for paints, coatings, adhesives, graphic
          arts and electronics.
      - name: Intermediates
        description: >-
          Upstream fluorogases, refrigerants, PMMA (Altuglas / Plexiglas) and
          hydrogen peroxide supplying both internal segments and external
          customers.
  - type: Features
    data:
      - name: Materials Science Platform
        description: >-
          "Building on its unique set of expertise in materials science, Arkema
          designs materials to address the ever-growing demand for innovative and
          sustainable materials."
      - name: Flagship Brand Portfolio
        description: >-
          Branded technology platforms including Bostik adhesives, Kynar PVDF,
          Rilsan and Rilsamid bio-based polyamides, Pebax elastomers, Sartomer
          photocurables, Coatex rheology modifiers and Altuglas / Plexiglas PMMA.
      - name: Global Manufacturing Footprint
        description: >-
          About 154 production plants and 17 R&D centers across 55 countries,
          enabling regional supply for global and local customers.
      - name: Product Finder
        description: >-
          A-Z index and criteria-based product search across 27 product families
          covering fluoropolymers, acrylics, amines, adhesives, coating resins,
          peroxides, PEKK, UV/LED/EB resins and polyimides.
      - name: Safety Data Sheets
        description: >-
          Product Safety portal providing regulatory documentation and SDS
          downloads for Arkema chemical products.
      - name: Sustainability Reporting
        description: >-
          Annual disclosure of Scope 1/2/3 emissions, SBTi-validated 1.5 degree
          trajectory, Net-Zero by 2050 ambition and Sustainable Solutions
          portfolio metrics in the Universal Registration Document.
  - type: UseCases
    data:
      - name: Battery and Hydrogen Materials
        description: >-
          Kynar PVDF binders and separators for lithium-ion batteries, plus
          fluoropolymer membranes for hydrogen electrolysis and fuel cells.
      - name: Lightweight Mobility
        description: >-
          Rilsan polyamide 11 fuel and brake lines, Pebax elastomers for sporting
          goods and automotive components, and PEKK composites for aerospace.
      - name: Sustainable Building
        description: >-
          Bostik tile adhesives, sealants and roofing systems, plus acrylic
          coating resins for low-VOC architectural paints.
      - name: Consumer Goods Packaging
        description: >-
          Bostik packaging adhesives for flexible lamination, labels, reclosable
          packaging and absorbent hygiene products.
      - name: Advanced Electronics
        description: >-
          Photocurable Sartomer resins, fluoropolymer films and high-purity
          intermediates for semiconductor manufacturing, displays and printed
          electronics.
      - name: Healthcare and Wellness
        description: >-
          Medical-grade Pebax, Rilsan and Kynar polymers for catheters, drug
          delivery, prosthetics and medical packaging.
  - type: Integrations
    data:
      - name: Bostik Customer Network
        description: >-
          Adhesive Solutions products distributed through construction merchants,
          industrial distributors and direct OEM contracts globally.
      - name: Specialty Polymer Distribution
        description: >-
          Kynar, Rilsan, Pebax, Kepstan and Sartomer product lines delivered to
          OEMs and formulators via Arkema regional sales and authorized
          distributors.
      - name: Joint Ventures and Acquisitions
        description: >-
          Strategic acquisitions and joint ventures expanding the Adhesive
          Solutions and Advanced Materials platforms, including Bostik (2015),
          Den Braven, ArrMaz, Ashland Performance Adhesives and PIAM.
      - name: Sustainability Frameworks
        description: >-
          Alignment with the Science Based Targets initiative (SBTi),
          Responsible Care, EcoVadis and CDP for emissions, water and supply-chain
          disclosure.
  - type: Strategy
    data:
      - name: 2028 Ambition
        description: >-
          Strategic plan targeting roughly EUR 12 billion in sales and ~18
          percent EBITDA margin by 2028, with ~4 percent organic sales growth
          and 7-8 percent organic EBITDA growth over 2024-2028.
      - name: Five Growth Sub-Markets
        description: >-
          Focused growth in green energy and e-mobility, advanced electronics,
          sustainable lifestyle, efficient buildings and healthcare and wellness,
          expected to grow at roughly 12 percent annually.
      - name: Net-Zero by 2050
        description: >-
          Decarbonization roadmap aligned with a 1.5 degree trajectory validated
          by SBTi, combining process electrification, low-carbon energy sourcing
          and Scope 3 supplier engagement.
      - name: One Arkema Operating Model
        description: >-
          Cross-segment "One Arkema" operating model emphasizing customer
          intimacy, manufacturing excellence, decarbonization and digitalization.
