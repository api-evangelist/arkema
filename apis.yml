description: >-
  Arkema S.A. is a French specialty materials company headquartered in La Defense,
  Paris and listed on Euronext Paris under ticker AKE. The group is organized around
  three Specialty Materials segments — Adhesive Solutions (anchored by the Bostik
  brand), Advanced Materials (high-performance polymers including Kynar PVDF, Rilsan
  polyamides, Pebax elastomers, Sartomer photocurable resins) and Coating Solutions
  (acrylic monomers, waterborne and solvent-borne resins, additives) — plus a smaller
  Intermediates business. Arkema employs roughly 21,000 people across 55 countries
  with about 154 production plants and 17 R&D centers, generating around EUR 9.1
  billion in 2025 revenue. Strategy is anchored in materials science, decarbonization
  and a validated 1.5 degree SBTi pathway toward Net-Zero by 2050. Arkema does not
  publish a public developer portal or REST API; customer integrations and product
  data are exchanged through commercial sales channels, the Product Finder web UI
  and Safety Data Sheet downloads.
